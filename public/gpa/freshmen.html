<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSITools</title>
</head>
<body>

    <!-- 
    This website used to be plain HTML + CSS + JS and all pages ended in .html
     Now that it uses React, I have noticed in Vercel analytics that people sometimes still go to gpa/freshmen.html instead of gpa/freshmen, which results in them getting error 404.
     -->
    <script>
  const path = window.location.pathname;

  if (path.endsWith(".html")) {
    const newPath = path.replace(/\.html$/, "");

    window.location.replace(
      newPath +
      window.location.search +
      window.location.hash
    );
  }
</script>
</body>
</html>
